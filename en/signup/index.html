<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up · Vesta OS</title>
  <link rel="stylesheet" href="/en/css/style.css" />
  <style>
    body {
      background: #f5f3ef;
      margin: 0;
      font-family: Inter, sans-serif;
      color: #171717;
    }

    .auth-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 520px;
    }

    .auth-title {
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      color: #24145f;
      text-align: left;
      margin: 0 0 14px 0;
    }

    .auth-subtitle {
      margin: 0 0 28px 0;
      color: #5c5c5c;
      font-size: 15px;
      line-height: 1.6;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .auth-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #171717;
    }

    .auth-input,
    .auth-select {
      width: 100%;
      height: 50px;
      border: 1px solid #d8d1c7;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 16px;
      background: #fff;
      box-sizing: border-box;
      outline: none;
    }

    .auth-input:focus,
    .auth-select:focus {
      border-color: #e91e63;
      box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.08);
    }

    .auth-btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 10px;
      background: #e91e63;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .auth-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 15px;
      color: #171717;
    }

    .auth-footer a {
      color: #e91e63;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .auth-title {
        font-size: 22px;
      }

      .auth-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1 class="auth-title">Start for free.</h1>
      <p class="auth-subtitle">Create your Vesta OS account and get set up for pricing, guest communication, dispatch, QA, and settlement.</p>

      <form class="auth-form">
        <div class="auth-grid">
          <div>
            <label class="auth-label" for="first_name">First name</label>
            <input class="auth-input" id="first_name" type="text" placeholder="First name" />
          </div>
          <div>
            <label class="auth-label" for="last_name">Last name</label>
            <input class="auth-input" id="last_name" type="text" placeholder="Last name" />
          </div>
        </div>

        <div class="auth-grid">
          <div>
            <label class="auth-label" for="email">Work email</label>
            <input class="auth-input" id="email" type="email" placeholder="username@example.com" />
          </div>
          <div>
            <label class="auth-label" for="company">Company</label>
            <input class="auth-input" id="company" type="text" placeholder="Company" />
          </div>
        </div>

        <div class="auth-grid">
          <div>
            <label class="auth-label" for="units">Listings under management</label>
            <select class="auth-select" id="units">
              <option>1–10</option>
              <option>11–25</option>
              <option>26–50</option>
              <option>51–100</option>
              <option>100+</option>
            </select>
          </div>
          <div>
            <label class="auth-label" for="username">Username</label>
            <input class="auth-input" id="username" type="text" placeholder="Choose a username" />
          </div>
        </div>

        <div class="auth-grid">
          <div>
            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" id="password" type="password" placeholder="Create a password" />
          </div>
          <div>
            <label class="auth-label" for="confirm_password">Confirm password</label>
            <input class="auth-input" id="confirm_password" type="password" placeholder="Confirm password" />
          </div>
        </div>

        <button class="auth-btn" type="submit">Create account</button>
      </form>

      <div class="auth-footer">
        Already have an account?
        <a href="/en/login/">Log in</a>
      </div>
    </section>
  </main>
</body>
</html>
