<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request access · Vesta OS</title>
  <link rel="stylesheet" href="/en/css/style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card auth-card-wide">
      <a class="auth-brand" href="/en/">VESTA OS</a>

      <h1>Request access to Vesta OS</h1>
      <p class="auth-subtitle">Tell us a bit about your operation. We’ll prepare the right workspace setup for your team.</p>

      <form id="signupForm" class="auth-form">
        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" type="text" required />

        <label for="email">Work email</label>
        <input id="email" name="email" type="email" placeholder="you@company.com" required />

        <label for="company">Company</label>
        <input id="company" name="company" type="text" required />

        <label for="properties">Number of properties</label>
        <select id="properties" name="properties" required>
          <option value="">Select</option>
          <option value="1-10">1–10</option>
          <option value="11-25">11–25</option>
          <option value="26-50">26–50</option>
          <option value="51-100">51–100</option>
          <option value="100+">100+</option>
        </select>

        <label for="city">Primary city</label>
        <input id="city" name="city" type="text" />

        <label for="need">Main operating need</label>
        <textarea id="need" name="need" rows="4" placeholder="For example: guest communication, pricing, dispatch, QA, settlement"></textarea>

        <p id="signupSuccess" class="auth-success" style="display:none;">Request received. We’ll contact you shortly.</p>
        <p id="signupError" class="auth-error" style="display:none;">Submission failed. Please try again.</p>

        <button id="signupSubmit" type="submit" class="auth-primary-btn">Request access</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="/en/login/">Log in</a>
      </p>
    </section>
  </main>

  <script>
    const SIGNUP_ENDPOINT = "https://script.google.com/macros/s/AKfycbzBefmSNTz0oyBdgIIqMYqqbbtiwwTw5Wgak4vY0sKPB4E08y_EBGeHvjaIbFflJ5U0/exec";

    const form = document.getElementById("signupForm");
    const submitButton = document.getElementById("signupSubmit");
    const success = document.getElementById("signupSuccess");
    const error = document.getElementById("signupError");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const payload = {
        language: "en",
        fullName: document.getElementById("fullName").value.trim(),
        email: document.getElementById("email").value.trim(),
        company: document.getElementById("company").value.trim(),
        properties: document.getElementById("properties").value,
        city: document.getElementById("city").value.trim(),
        need: document.getElementById("need").value.trim(),
        source: window.location.pathname
      };

      if (!payload.fullName || !payload.email || !payload.company || !payload.properties) {
        error.textContent = "Please fill out full name, work email, company, and number of properties.";
        error.style.display = "block";
        success.style.display = "none";
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Submitting...";

      try {
        await fetch(SIGNUP_ENDPOINT, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        success.style.display = "block";
        error.style.display = "none";

        setTimeout(() => {
          window.location.href = "/en/dashboard/";
        }, 1200);

      } catch (err) {
        error.style.display = "block";
        success.style.display = "none";
        submitButton.disabled = false;
        submitButton.textContent = "Request access";
      }
    });
  </script>
</body>
</html>
