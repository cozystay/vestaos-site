<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Vesta OS</title>
  <link rel="stylesheet" href="/en/css/style.css" />
  <style>
    body {
      background: #f5f3ef;
      margin: 0;
      font-family: Inter, sans-serif;
      color: #171717;
    }

    .auth-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
    }

    .auth-title {
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      color: #24145f;
      text-align: left;
      margin: 0 0 28px 0;
    }

    .google-btn,
    .email-btn {
      width: 100%;
      height: 50px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .google-btn {
      border: 1px solid #ddd5ca;
      background: #fff;
      color: #171717;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .google-icon {
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      color: #4285F4;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: #5c5c5c;
      font-weight: 600;
      font-size: 14px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #d8d1c7;
    }

    .auth-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #171717;
    }

    .auth-input {
      width: 100%;
      height: 50px;
      border: 1px solid #d8d1c7;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 16px;
      background: #fff;
      box-sizing: border-box;
      outline: none;
    }

    .auth-input:focus {
      border-color: #e91e63;
      box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.08);
    }

    .input-wrap {
      margin-bottom: 24px;
    }

    .email-btn {
      border: none;
      background: #e91e63;
      color: #fff;
    }

    .auth-footer {
      margin-top: 34px;
      text-align: center;
      font-size: 15px;
      color: #171717;
    }

    .auth-footer a {
      color: #e91e63;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .auth-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1 class="auth-title">Welcome back!</h1>

      <button class="google-btn" type="button">
        <span class="google-icon">G</span>
        <span>Login with Google</span>
      </button>

      <div class="auth-divider">or</div>

      <div class="input-wrap">
        <label class="auth-label" for="email">Email</label>
        <input
          class="auth-input"
          id="email"
          name="email"
          type="email"
          placeholder="username@example.com"
        />
      </div>

      <button class="email-btn" type="button">Login with email</button>

      <div class="auth-footer">
        Don't have an account?
        <a href="/en/signup/">Start for free →</a>
      </div>
    </section>
  </main>
</body>
</html>
