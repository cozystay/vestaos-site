<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>申请开通 · Vesta OS</title>
  <link rel="stylesheet" href="/en/css/style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card auth-card-wide">
      <a class="auth-brand" href="/zh/">VESTA OS</a>

      <h1>申请开通 Vesta OS</h1>
      <p class="auth-subtitle">留下你的运营信息，我们会为你的团队准备合适的 Vesta OS 工作台。</p>

      <form id="signupForm" class="auth-form">
        <label for="fullName">姓名</label>
        <input id="fullName" name="fullName" type="text" required />

        <label for="email">工作邮箱</label>
        <input id="email" name="email" type="email" placeholder="you@company.com" required />

        <label for="company">公司名称</label>
        <input id="company" name="company" type="text" required />

        <label for="properties">管理房源数量</label>
        <select id="properties" name="properties" required>
          <option value="">请选择</option>
          <option value="1-10">1–10</option>
          <option value="11-25">11–25</option>
          <option value="26-50">26–50</option>
          <option value="51-100">51–100</option>
          <option value="100+">100+</option>
        </select>

        <label for="city">主要运营城市</label>
        <input id="city" name="city" type="text" />

        <label for="need">当前主要需求</label>
        <textarea id="need" name="need" rows="4" placeholder="例如：住客沟通、动态定价、清洁派单、质检、结算等"></textarea>

        <p id="signupSuccess" class="auth-success" style="display:none;">申请已收到，我们会尽快联系你。</p>
        <p id="signupError" class="auth-error" style="display:none;">提交失败，请稍后重试。</p>

        <button id="signupSubmit" type="submit" class="auth-primary-btn">申请开通</button>
      </form>

      <p class="auth-switch">
        已有账号？
        <a href="/zh/login/">登录</a>
      </p>
    </section>
  </main>

  <script>
    const SIGNUP_ENDPOINT = "https://script.google.com/macros/s/AKfycbzBefmSNTz0oyBdgIIqMYqqbbtiwwTw5Wgak4vY0sKPB4E08y_EBGeHvjaIbFflJ5U0/exec";

    const form = document.getElementById("signupForm");
    const submitButton = document.getElementById("signupSubmit");
    const success = document.getElementById("signupSuccess");
    const error = document.getElementById("signupError");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const payload = {
        language: "zh",
        fullName: document.getElementById("fullName").value.trim(),
        email: document.getElementById("email").value.trim(),
        company: document.getElementById("company").value.trim(),
        properties: document.getElementById("properties").value,
        city: document.getElementById("city").value.trim(),
        need: document.getElementById("need").value.trim(),
        source: window.location.pathname
      };

      if (!payload.fullName || !payload.email || !payload.company || !payload.properties) {
        error.textContent = "请填写姓名、工作邮箱、公司名称和管理房源数量。";
        error.style.display = "block";
        success.style.display = "none";
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "提交中...";

      try {
        await fetch(SIGNUP_ENDPOINT, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        success.style.display = "block";
        error.style.display = "none";

        setTimeout(() => {
          window.location.href = "/zh/dashboard/";
        }, 1200);

      } catch (err) {
        error.style.display = "block";
        success.style.display = "none";
        submitButton.disabled = false;
        submitButton.textContent = "申请开通";
      }
    });
  </script>
</body>
</html>
